name: Auto Convert OmniBox

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "pool.json"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Convert
        run: node convert.mjs

     - name: Commit changes
  uses: stefanzweifel/git-auto-commit-action@v5
  with:
    commit_message: auto update
